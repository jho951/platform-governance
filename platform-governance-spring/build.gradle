dependencies {
    api project(':platform-governance-api')
    implementation project(':platform-governance-adapter-auditlog')
    implementation project(':platform-governance-adapter-policyconfig')
    implementation project(':platform-governance-core')
    implementation project(':platform-governance-engine')

    implementation "io.github.jho951:audit-log-core:${rootProject.auditLogVersion}"
    implementation "io.github.jho951:policy-config-core:${rootProject.policyConfigVersion}"
    implementation "io.github.jho951:policy-config-builder:${rootProject.policyConfigVersion}"
    implementation "io.github.jho951:plugin-policy-engine-config:${rootProject.pluginPolicyEngineVersion}"

    compileOnly "org.springframework:spring-context:${rootProject.springFrameworkVersion}"
    compileOnly "org.springframework.boot:spring-boot-autoconfigure:${rootProject.springBootVersion}"
    compileOnly "org.springframework.boot:spring-boot-configuration-processor:${rootProject.springBootVersion}"
    annotationProcessor "org.springframework.boot:spring-boot-configuration-processor:${rootProject.springBootVersion}"

    testImplementation "org.springframework:spring-context:${rootProject.springFrameworkVersion}"
    testImplementation "org.springframework.boot:spring-boot-autoconfigure:${rootProject.springBootVersion}"
    testImplementation "org.springframework.boot:spring-boot-test:${rootProject.springBootVersion}"
    testImplementation "org.assertj:assertj-core:${rootProject.assertjVersion}"
    testImplementation "org.junit.jupiter:junit-jupiter-api:${rootProject.junitVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${rootProject.junitVersion}"
}
